openapi: 3.1.0
info:
  title: PAI Chatbot Backend
  description: Smart farm digital-twin chatbot backend demo service.
  version: 0.1.0
paths:
  /health:
    get:
      tags:
      - system
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Health Get
  /chat/sessions:
    post:
      tags:
      - chat
      summary: Create Session
      operationId: create_session_chat_sessions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/messages:
    post:
      tags:
      - chat
      summary: Post Chat Message
      operationId: post_chat_message_chat_messages_post
      parameters:
      - name: x-correlation-id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /events/robot-command:
    post:
      tags:
      - events
      summary: Receive Robot Event
      operationId: receive_robot_event_events_robot_command_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionEventRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ChatMessage:
      properties:
        message_id:
          type: string
          title: Message Id
        session_id:
          type: string
          title: Session Id
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
          title: Content
        correlation_id:
          type: string
          title: Correlation Id
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - session_id
      - role
      - content
      - correlation_id
      title: ChatMessage
    ChatRequest:
      properties:
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
        message:
          type: string
          maxLength: 2000
          minLength: 1
          title: Message
        user_id:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
        unreal_client_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Unreal Client Id
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
      type: object
      required:
      - message
      title: ChatRequest
    ChatResponse:
      properties:
        session_id:
          type: string
          title: Session Id
        correlation_id:
          type: string
          title: Correlation Id
        message:
          $ref: '#/components/schemas/ChatMessage'
        command_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Command Id
        status:
          anyOf:
          - $ref: '#/components/schemas/CommandStatus'
          - type: 'null'
        events:
          items:
            $ref: '#/components/schemas/DomainEvent'
          type: array
          title: Events
      type: object
      required:
      - session_id
      - correlation_id
      - message
      title: ChatResponse
    CommandStatus:
      type: string
      enum:
      - pending
      - accepted
      - running
      - completed
      - failed
      - pending_confirmation
      title: CommandStatus
    CompletionEventRequest:
      properties:
        event_type:
          type: string
          title: Event Type
        correlation_id:
          type: string
          title: Correlation Id
        session_id:
          type: string
          title: Session Id
        command_id:
          type: string
          title: Command Id
        payload:
          additionalProperties: true
          type: object
          title: Payload
      type: object
      required:
      - event_type
      - correlation_id
      - session_id
      - command_id
      title: CompletionEventRequest
    CreateSessionRequest:
      properties:
        user_id:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
        unreal_client_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Unreal Client Id
      type: object
      title: CreateSessionRequest
    DomainEvent:
      properties:
        event_id:
          type: string
          title: Event Id
        event_type:
          type: string
          title: Event Type
        correlation_id:
          type: string
          title: Correlation Id
        session_id:
          type: string
          title: Session Id
        command_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Command Id
        occurred_at:
          type: string
          format: date-time
          title: Occurred At
        payload:
          additionalProperties: true
          type: object
          title: Payload
      type: object
      required:
      - event_type
      - correlation_id
      - session_id
      title: DomainEvent
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    MessageRole:
      type: string
      enum:
      - user
      - assistant
      - system
      title: MessageRole
    SessionResponse:
      properties:
        session_id:
          type: string
          title: Session Id
        user_id:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
        unreal_client_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Unreal Client Id
      type: object
      required:
      - session_id
      - user_id
      - unreal_client_id
      title: SessionResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
