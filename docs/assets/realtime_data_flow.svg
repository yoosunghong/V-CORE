<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI',Roboto,'Malgun Gothic',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowA" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/>
    </marker>
  </defs>

  <style>
    .box   { rx:10; ry:10; stroke-width:1.5; }
    .title { font-size:15px; font-weight:700; fill:#0f172a; }
    .sub   { font-size:11.5px; fill:#475569; }
    .lbl   { font-size:11.5px; font-weight:600; }
    .note  { font-size:11px; fill:#64748b; }
    .hdr   { font-size:13px; font-weight:700; }
  </style>

  <!-- ===================== UE5 producer ===================== -->
  <rect class="box" x="330" y="24" width="300" height="78" fill="#eef2ff" stroke="#6366f1"/>
  <text class="title" x="480" y="50" text-anchor="middle">UE5 · AAGVSimController</text>
  <text class="sub"   x="480" y="70" text-anchor="middle">EmitTelemetry() ~20 frames/s</text>
  <text class="sub"   x="480" y="87" text-anchor="middle">kind=agv (대당) · kind=process (셀+HUD) · 도메인 이벤트</text>

  <!-- WS link -->
  <line x1="480" y1="102" x2="480" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="lbl" x="492" y="130" fill="#475569">WebSocket  /internal/ue5/stream  (x-agv-api-key)</text>

  <!-- ===================== backend ===================== -->
  <rect class="box" x="280" y="152" width="400" height="92" fill="#f1f5f9" stroke="#475569"/>
  <text class="title" x="480" y="178" text-anchor="middle">chatbot-backend (FastAPI)</text>
  <text class="sub"   x="480" y="198" text-anchor="middle">ue5_ingest: 프레임 수신 → 2-경로 분기 (fork)</text>
  <text class="note"  x="480" y="216" text-anchor="middle">raw-socket(UDP:9999/TCP:9998)은 Windows Docker 프록시를</text>
  <text class="note"  x="480" y="231" text-anchor="middle">못 넘어가 → WebSocket 릴레이로 대체</text>

  <!-- fork lines -->
  <line x1="400" y1="244" x2="250" y2="300" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#arrowA)"/>
  <text class="lbl" x="250" y="278" fill="#1d4ed8" text-anchor="middle">① 주 경로 (in-process)</text>
  <line x1="560" y1="244" x2="710" y2="300" stroke="#b45309" stroke-width="2.2" marker-end="url(#arrowB)"/>
  <text class="lbl" x="712" y="278" fill="#b45309" text-anchor="middle">② 보조 경로 (fire-and-forget)</text>

  <!-- ===================== Path A (primary, blue) ===================== -->
  <rect class="box" x="40" y="302" width="380" height="74" fill="#eff6ff" stroke="#1d4ed8"/>
  <text class="title" x="230" y="328" text-anchor="middle">LiveTelemetryHub  (인메모리 캐시)</text>
  <text class="sub"   x="230" y="348" text-anchor="middle">최신 agv 맵 + process 스냅샷, 5s staleness</text>
  <text class="sub"   x="230" y="365" text-anchor="middle">Firebase 비의존 · 자격증명 없이 동작</text>

  <line x1="230" y1="376" x2="230" y2="424" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#arrowA)"/>
  <text class="lbl" x="242" y="404" fill="#1d4ed8">SSE  /unreal/telemetry/stream  (1s poll)</text>

  <rect class="box" x="40" y="426" width="380" height="70" fill="#eff6ff" stroke="#1d4ed8"/>
  <text class="title" x="230" y="452" text-anchor="middle">React 오버레이 — 주 경로</text>
  <text class="sub"   x="230" y="472" text-anchor="middle">EventSource: agvs · process · hud</text>
  <text class="sub"   x="230" y="489" text-anchor="middle">stale 시 idle reset 프레임 → HUD 프리징 방지</text>

  <!-- ===================== Path B (secondary, amber) ===================== -->
  <rect class="box" x="540" y="302" width="380" height="74" fill="#fffbeb" stroke="#b45309"/>
  <text class="title" x="730" y="328" text-anchor="middle">telemetry-collector</text>
  <text class="sub"   x="730" y="348" text-anchor="middle">HTTP POST /ingest (in-Docker network)</text>
  <text class="sub"   x="730" y="365" text-anchor="middle">handle_payload → 키 sanitize → 싱크 write</text>

  <line x1="730" y1="376" x2="730" y2="424" stroke="#b45309" stroke-width="2.2" marker-end="url(#arrowB)"/>
  <text class="lbl" x="742" y="404" fill="#b45309">firebase-admin set() (executor)</text>

  <rect class="box" x="540" y="426" width="380" height="74" fill="#fffbeb" stroke="#b45309"/>
  <text class="title" x="730" y="452" text-anchor="middle">Firebase Realtime Database</text>
  <text class="sub"   x="730" y="472" text-anchor="middle">cells/{cell}/agvs/{id} · cells/{cell}/process</text>
  <text class="sub"   x="730" y="489" text-anchor="middle">미설정 시 NullSink로 graceful degrade</text>

  <line x1="730" y1="500" x2="730" y2="540" stroke="#b45309" stroke-width="2.2" marker-end="url(#arrowB)"/>
  <rect class="box" x="540" y="542" width="380" height="58" fill="#fffbeb" stroke="#b45309"/>
  <text class="title" x="730" y="566" text-anchor="middle">React — 보조 경로 (firebase.ts onValue)</text>
  <text class="sub"   x="730" y="585" text-anchor="middle">augment-only: 빈 RTDB 스냅샷이 SSE 라이브를 덮지 않음(2s 가드)</text>

  <!-- merge note -->
  <line x1="420" y1="461" x2="540" y2="571" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text class="note" x="468" y="540" text-anchor="middle">동일 프레임 계약</text>
  <text class="note" x="468" y="554" text-anchor="middle">두 경로 병합</text>
</svg>
